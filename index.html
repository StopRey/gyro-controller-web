<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gyro</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      min-height: 100svh;
      background: radial-gradient(1200px 800px at 20% 0%, #1b2b2b 0%, #0b0f12 45%, #07090b 100%);
      color: #e9eef2;
    }
    h1 { margin: 0 0 0.75rem; font-size: 1.35rem; font-weight: 650; letter-spacing: 0.2px; }
    .card {
      max-width: 520px;
      margin: 0 auto;
      min-height: calc(100svh - (max(12px, env(safe-area-inset-top)) + max(12px, env(safe-area-inset-bottom))));
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: clamp(14px, 2.8vw, 18px);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
    }
    .subtle { opacity: 0.9; }
    .muted { opacity: 0.7; font-size: 0.95rem; }
    .kv { margin: 0.75rem 0 1rem; padding: 0.75rem; border-radius: 12px; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.08); }
    .kv code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.95rem; }

    button { width: 100%; padding: 1rem; font-size: 1.1rem; border: none; border-radius: 12px; background: linear-gradient(180deg, #2fbf8f 0%, #1f9a73 100%); color: #062016; cursor: pointer; font-weight: 650; }
    button.secondary { background: rgba(255,255,255,0.08); color: #e9eef2; border: 1px solid rgba(255,255,255,0.14); }
    button.danger { background: rgba(255,90,90,0.18); color: #ffdada; border: 1px solid rgba(255,90,90,0.35); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btnRow { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.75rem; }
    .btnRow button { padding: 0.95rem; font-size: 1.05rem; }

    .warn { color: #fa4; }
    .ok { color: #8d8; }
    .err { color: #f66; }
    #banner { background: rgba(47,191,143,0.10); border: 1px solid rgba(47,191,143,0.28); border-radius: 12px; padding: 0.75rem; margin: 0.75rem 0 1rem; }
    #banner.ok { background: rgba(47,191,143,0.12); border-color: rgba(47,191,143,0.34); }
    #banner.err { background: rgba(255,90,90,0.10); border-color: rgba(255,90,90,0.25); }
    #banner.warn { background: rgba(255,190,90,0.10); border-color: rgba(255,190,90,0.25); }

    /* layout helpers */
    .screen {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .pushBottom { margin-top: auto; }

    @media (max-width: 380px) {
      h1 { font-size: 1.2rem; }
      button { font-size: 1.02rem; padding: 0.95rem; }
      .btnRow { gap: 0.6rem; }
    }
  </style>
</head>
<body>
  <script>
    const CONFIG = { SOCKET_SERVER_URL: 'https://gyro-relay-backend.onrender.com' };
  </script>

  <div class="card">
    <h1 id="title">3D Viewer Control</h1>
    <div class="kv">
      <div class="muted">Project</div>
      <div class="subtle" id="projectName">—</div>
      <div class="muted" style="margin-top:0.5rem">Room</div>
      <div><code id="roomCode">—</code></div>
    </div>

    <div id="banner" class="warn">Ready</div>

    <div id="startScreen" class="screen">
      <div class="muted">
        Tip: gyro permissions require HTTPS (or localhost).
      </div>
      <div class="pushBottom">
        <button type="button" id="startBtn">Start Control</button>
      </div>
    </div>

    <div id="controlScreen" class="screen" style="display:none">
      <button type="button" id="calibrateBtn" class="secondary">Calibrate (set current pose as zero)</button>
      <div class="pushBottom">
        <div class="btnRow">
          <button type="button" id="zoomOutBtn" class="secondary">Zoom −</button>
          <button type="button" id="zoomInBtn" class="secondary">Zoom +</button>
        </div>
        <button type="button" id="stopBtn" class="danger" style="margin-top:0.75rem">Stop</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      const roomFromUrl = (new URLSearchParams(location.search).get('room') || '').trim();
      const projectFromUrl = (new URLSearchParams(location.search).get('project') || '').trim();
      const startBtn = document.getElementById('startBtn');
      const calibrateBtn = document.getElementById('calibrateBtn');
      const zoomInBtn = document.getElementById('zoomInBtn');
      const zoomOutBtn = document.getElementById('zoomOutBtn');
      const stopBtn = document.getElementById('stopBtn');

      const banner = document.getElementById('banner');
      const roomCode = document.getElementById('roomCode');
      const projectName = document.getElementById('projectName');
      const startScreen = document.getElementById('startScreen');
      const controlScreen = document.getElementById('controlScreen');

      roomCode.textContent = roomFromUrl || 'Missing (?room=1234)';
      projectName.textContent = projectFromUrl || '—';

      const RATE_MS = Math.round(1000 / 30);
      let latest = { alpha: 0, beta: 0, gamma: 0 };
      let sending = false;
      let intervalId = null;
      let socket = null;

      function setBanner(text, cls) {
        banner.textContent = text;
        banner.className = cls || 'warn';
      }

      function ensureSocket() {
        if (socket) return socket;
        socket = io(CONFIG.SOCKET_SERVER_URL.replace(/\/$/, ''), {
          transports: ['websocket', 'polling'],
          path: '/socket.io/',
        });
        socket.on('connect', () => setBanner('Connected', 'ok'));
        socket.on('disconnect', () => setBanner('Disconnected', 'err'));
        socket.on('connect_error', (err) => setBanner(String(err && err.message ? err.message : err), 'err'));
        socket.on('kicked', () => {
          // Another controller joined the same room and replaced this phone.
          sending = false;
          if (intervalId != null) {
            clearInterval(intervalId);
            intervalId = null;
          }
          try { window.removeEventListener('deviceorientation', onOrient, true); } catch {}
          controlScreen.style.display = 'none';
          startScreen.style.display = 'block';
          startBtn.disabled = false;
          setBanner('Disconnected: another phone took control of this room.', 'err');
        });
        return socket;
      }

      function startGyroLoop() {
        if (intervalId != null) return;
        intervalId = setInterval(() => {
          if (!sending || !socket || !socket.connected) return;
          socket.emit('gyro-data', { alpha: latest.alpha, beta: latest.beta, gamma: latest.gamma });
        }, RATE_MS);
      }

      function onOrient(ev) {
        if (ev.alpha == null && ev.beta == null && ev.gamma == null) return;
        if (ev.alpha != null) latest.alpha = ev.alpha;
        if (ev.beta != null) latest.beta = ev.beta;
        if (ev.gamma != null) latest.gamma = ev.gamma;
      }

      async function startControl() {
        if (!roomFromUrl) {
          setBanner('Missing room: open the link/QR from Unity (it contains ?room=...)', 'err');
          return;
        }
        startBtn.disabled = true;
        try {
          if (typeof DeviceOrientationEvent !== 'undefined' &&
              typeof DeviceOrientationEvent.requestPermission === 'function') {
            if ((await DeviceOrientationEvent.requestPermission()) !== 'granted') {
              setBanner('Orientation permission denied', 'err');
              startBtn.disabled = false;
              return;
            }
          }
        } catch (e) {
          setBanner(e.message, 'err');
          startBtn.disabled = false;
          return;
        }

        const s = ensureSocket();
        if (!s.connected) {
          await new Promise((r) => {
            if (s.connected) return r();
            s.once('connect', r);
            s.once('connect_error', r);
          });
        }
        if (!s.connected) {
          setBanner('No connection to relay', 'err');
          startBtn.disabled = false;
          return;
        }

        s.emit('join-room', { roomId: roomFromUrl, role: 'controller' });
        setBanner('Joined room. Move your phone to rotate the scene.', 'ok');

        window.addEventListener('deviceorientation', onOrient, true);
        sending = true;
        startGyroLoop();

        startScreen.style.display = 'none';
        controlScreen.style.display = 'block';
      }

      calibrateBtn.addEventListener('click', function () {
        if (!socket || !socket.connected || !sending) return;
        socket.emit('gyro-calibrate', {
          alpha: latest.alpha,
          beta: latest.beta,
          gamma: latest.gamma,
        });
        setBanner('Calibrated: current phone pose = zero', 'ok');
      });

      function sendZoom(delta) {
        if (!socket || !socket.connected || !sending) return;
        socket.emit('gyro-zoom', { delta: delta });
      }

      zoomInBtn.addEventListener('click', () => sendZoom(+1));
      zoomOutBtn.addEventListener('click', () => sendZoom(-1));

      stopBtn.addEventListener('click', () => {
        sending = false;
        if (intervalId != null) {
          clearInterval(intervalId);
          intervalId = null;
        }
        try { window.removeEventListener('deviceorientation', onOrient, true); } catch {}
        setBanner('Stopped. Tap Start Control to resume.', 'warn');
        controlScreen.style.display = 'none';
        startScreen.style.display = 'block';
        startBtn.disabled = false;
      });

      startBtn.addEventListener('click', startControl);
      if (!window.isSecureContext) setBanner('Use HTTPS for gyro (permissions)', 'err');
    })();
  </script>
</body>
</html>
